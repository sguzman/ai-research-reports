description: >
  A research report testing the hypothesis that, since 1945, U.S. liberal-centrist institutions
  have repeatedly absorbed and domesticated left movements by selectively incorporating demands,
  professionalizing activism into NGOs and policy/legal channels, capturing leadership into careers,
  shaping media narratives, and combining inclusion with selective repression. Includes periodization
  across major postwar eras and multiple case studies spanning labor, civil rights, antiwar activism,
  feminism, environmentalism, anti-globalization, Occupy, Sanders-era insurgency, and Black Lives Matter.

