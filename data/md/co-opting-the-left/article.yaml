---
abstract: A research-style synthesis arguing that, since 1945, U.S. liberal and centrist institutions
  (party politics, major NGOs, philanthropy, media, academia, courts, and corporate actors) have repeatedly
  absorbed, redirected, and professionalized left movements. It surveys a recurring “toolbox” of mechanisms—partial
  policy concessions, leadership/career capture, nonprofit funding channels, narrative framing, and selective
  inclusion alongside repression— and illustrates them across postwar labor politics through contemporary
  movements such as Occupy Wall Street and Black Lives Matter.
