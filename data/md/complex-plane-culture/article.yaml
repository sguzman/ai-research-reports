date: "2026-01-31"

cover-image: "cover.png"

description: >
  A cultural-intellectual history tracing how the “imaginary” unit i evolved from an algebraic
  convenience into the geometric complex plane, then into a foundational tool for physics,
  engineering, computation, and modern visual culture. Covers the shift from symbolic manipulation
  (Euler) to geometric interpretation (Wessel, Argand, Gauss), the rise of complex analysis (Cauchy,
  Riemann), industrial-era applications (phasors, circuits), quantum mechanics, and the postwar
  explosion of computer visualization and fractals (Julia/Fatou, Mandelbrot), ending with contemporary
  uses in quantum computing and machine learning.

