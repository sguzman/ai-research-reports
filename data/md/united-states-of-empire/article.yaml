abstract: 'The United States formally operates as a constitutional federation, but many scholars and critics
  argue it often behaves like an empire – a powerful center imposing a uniform vision over diverse regions.
  This report investigates whether the U.S. central government and its elites systematically manage **regional
  folkways** (local cultures and customs) in an imperial fashion, and how this contrasts with genuine
  pluralistic federalism. We ask: *Does U.S. governance lean toward central domination or pluralistic
  accommodation of local diversity?* Historical analysis (from colonial folkways to 20th‑century civil
  rights) and political theory (definitions of federation vs. empire and pluralism) are used to frame
  the issue. We then identify mechanisms of control (culture/media, education, policy,…'
