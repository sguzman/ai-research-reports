abstract: >-
  A long-form, historically organized survey of type theory from early 20th-century foundations
  through programming-language practice and modern proof assistants, emphasizing the co-evolution
  of logic, computation, and formal verification. Covers key milestones such as typed lambda calculus,
  Curry-Howard, polymorphism and type inference, dependent types, and contemporary trends including
  proof-carrying code, verified systems, and homotopy type theory.
