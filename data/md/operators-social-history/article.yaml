---
abstract: >-
  A chronological, social-intellectual history of how “operators” moved from being
  informal calculation procedures (differentiate, integrate, take differences) to
  fully legitimate mathematical objects with their own algebra, classification, and
  theories. The essay tracks the reification of actions into entities through
  notation, pedagogy, and disciplinary conflict: early operational calculus and the
  symbolic D; the 19th-century rise of matrices and linear transformations; debates
  between quaternionists and vector analysts; engineers’ pragmatic operator methods
  (notably Heaviside) versus demands for rigor; and the early 20th-century
  consolidation of operator theory inside functional analysis (Fredholm, Hilbert,
  Riesz), culminating in the central role of operators in modern physics and
  computation.

