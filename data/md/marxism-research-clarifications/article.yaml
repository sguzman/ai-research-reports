abstract: '**Executive Summary** - **Evolution of Marxism (1840s–2020s):** Marxism originated in the 1840s
  as the theory and program of Karl Marx and Friedrich Engels, calling for proletarian revolution against
  capitalism[\[1\]](https://www.history.com/articles/communism-timeline#:~:text=%E2%80%A2%C2%A0February%2021%2C%201848%3A%20German%20economist,quickly%20became%20a%20rallying%20cry).
  Over nearly two centuries it has evolved through various phases – from **classical Marxism** in the
  19th century, through **Leninism** and 20th-century communism, to diverse contemporary currents. Marxism
  changed over time in response to historical conditions: e.g. Lenin’s adaptation of Marxism to a less-developed,
  wartime Russia (introducing the **vanguard party** and emphasizing peasant revolutions)[\[2\]](https:…'
