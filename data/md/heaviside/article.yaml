abstract: Oliver Heaviside (1850–1925) was a largely self-educated British engineer and mathematical physicist
  who transformed Maxwell’s electromagnetic theory into a usable form and invented powerful symbolic techniques
  for solving circuit and field problems. He started as a telegraph operator and, after deafness forced
  him to retire in 1874, devoted himself to electricity and mathematics. Heaviside reorganized James Clerk
  Maxwell’s cumbersome 20-equation system into the four-vector equations used today[\[1\]](https://mathshistory.st-andrews.ac.uk/Biographies/Heaviside/#:~:text=Summary%20Oliver%20Heaviside%20proved%20important,4%20equations%20in%202%20variables),
