---
abstract: >-
  An institutional overview of judges in the United States judicial process,
  covering the constitutional distinction between Article III judges and other
  judicial officers, the structure of federal and representative state systems,
  methods of selection, powers and constraints, compensation, and the practical
  variation across jurisdictions. The report treats “judge” not as a single
  office but as a family of positions shaped by constitutional design, statute,
  court structure, and political selection mechanisms.
