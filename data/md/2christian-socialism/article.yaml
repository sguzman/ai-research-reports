---
abstract: >-
  This report reconstructs the mid-Victorian "Christian Socialist" current centered on
  Anglican theologian F. D. Maurice and priest-novelist Charles Kingsley, situating their
  1848-1854 activism and its 1860s afterlives within the pressures of industrial Britain,
  Chartism, and urban public-health crisis. It explains how Maurice and Kingsley reworked
  "socialism" into a Christian language of cooperative association rather than class war,
  and how they translated doctrine into institutions: co-operative workshops, adult
  education, and church reform. The report emphasizes (1) Maurice's ecclesiology (the
  Church as a universal society grounding social duty), (2) Kingsley's incarnational and
  moral rhetoric ("muscular Christianity") as a popular vehicle for social conscience,
  and (3) the movement's practical constraints and legacies, including later Anglican
  social mission, co-operative legal recognition, and the normalization of "social"
  Christianity in the Church of England.
