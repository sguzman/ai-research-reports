title: Christian Socialism in Mid-Victorian Britain
subtitle: Maurice, Kingsley, and the Anglican Roots of Social Reform (1848–1865)
linkTitle: ''
description: A research note on mid-Victorian Anglican “Christian Socialism,” focusing on F. D. Maurice
  and Charles Kingsley, their theological rationale, key texts, and practical experiments in co-operation
  and adult education.
summary: ''
abstract: 'In mid-Victorian Britain, Anglican priests Frederick Denison Maurice and Charles Kingsley advanced
  “Christian Socialism” as a theological response to industrial poverty and the revolutionary anxieties
  of 1848. Grounding social reform in the doctrines of God’s Fatherhood and the resulting brotherhood
  of humanity, they argued that Christianity’s core claims demand concrete social duties in wages, education,
  housing, and public health.

  This article maps the movement’s key texts and events (1848–1865), profiles its principal figures, and
  explains how Maurice and Kingsley re-framed “socialism” as voluntary Christian cooperation rather than
  atheistic revolution. It also traces their institutional experiments (co-operatives, workingmen’s education)
  and assesses their legacy in Anglican social thought and later Christian labor movements.'
