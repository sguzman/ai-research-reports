---
abstract: >-
  In the mid-19th century, Karl Marx and Friedrich Engels recast the relationship
  between "socialism" and "communism" by presenting their program as "scientific
  socialism": an approach grounded in historical materialism, class antagonism,
  and the analysis of capitalist development rather than in moral appeals or
  invented utopias. Using the 1848 Communist Manifesto as the central text, this
  essay traces how Marx and Engels deliberately adopted the label "communist" to
  distinguish their doctrine from rival socialist currents, then follows early
  reception through correspondence, press reactions, and key events from 1846 to
  1860. It supplements close reading with a lightweight textual/network scan of
  recurring terms (e.g., bourgeoisie, proletariat, class, property) to surface
  thematic clusters and to show how "communism" was framed as the advanced,
  scientifically justified form of socialism.

