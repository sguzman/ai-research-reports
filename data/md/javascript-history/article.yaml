abstract: >-
  A structured, era-by-era history of JavaScript from 1995 to 2025 that
  integrates formal developments (ECMA-262/TC39 standardization, browser engine
  advances, governance bodies) with informal evolution (libraries, frameworks,
  tooling waves, community norms), emphasizing the feedback loop between
  practice and standards.
