---
abstract: 'A long-form historical and conceptual survey of Marxism’s evolution from the 1840s to the present:
  its major phases (classical Marxism, Leninism, Stalin-era Marxism–Leninism, Maoism, Western Marxism,
  Eurocommunism, post-1989 currents), its recurring internal disputes (reform vs. revolution, vanguard
  vs. spontaneity, internationalism vs. “socialism in one country,” markets vs. planning), and the way
  real-world state power, geopolitical conflict, and economic crises reshaped the theory’s practical meaning.'
