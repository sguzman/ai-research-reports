abstract: '**Executive Summary:** In medieval and early modern Europe, a discipline’s prestige depended
  largely on its *convertibility* into real power and status. Law attained immense prestige from c.1100–1700
  because it underpinned kings’ and nobles’ claims, property, and administration. Mastery of law – through
  universities, courts, and legal offices – was a direct route to high office and even hereditary nobility
  (e.g. France’s *noblesse de robe*[\[1\]](https://www.britannica.com/topic/noblesse-de-robe#:~:text=noblesse%20de%20robe%2C%20,were%20the%20officers%20of%20such)[\[2\]](https://www.britannica.com/topic/noblesse-de-robe#:~:text=Because%20of%20their%20bourgeois%20background%2C,lead%20in%20opposition%20to%20reform)).
