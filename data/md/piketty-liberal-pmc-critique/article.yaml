abstract: 'Thomas Piketty’s *Capital in the Twenty-First Century* emphasizes that the explosion of inequality
  in recent decades has been driven **not by impersonal market forces alone but by an unprecedented surge
  in top managers’ earnings**. Piketty documents that in the U.S. roughly 60–70% of incomes in the top
  0.1% (2000–2010) came from “supermanagers,” far outpacing the share from entertainers or athletes[\[1\]](https://dowbor.org/wp-content/uploads/2014/06/14Thomas-Piketty.pdf#:~:text=chooses%29%20of%20the%20top%200,of%20%E2%80%9Csupermanagers%E2%80%9D%20than%20with%20that).
  He attributes this to corporate governance failures: today’s top executives effectively **set their
  own pay**. “These top managers by and large have the power to set their own remuneration, in some cases
