abstract: 'As advanced economies shift from heavy industry and traditional male roles toward service and
  knowledge sectors, **masculinity’s material basis has eroded**. Yet many men still crave the status
  and identity once conferred by breadwinning, physical strength, and patriarchal authority. The result
  is a **contradiction**: masculinity is both felt as an essential part of self-worth and increasingly
  **deselected** by modern institutions. In practice this leads men to express masculinity more as **theater
  than function**. Traditional provider or protector roles no longer guarantee prestige, so men resort
