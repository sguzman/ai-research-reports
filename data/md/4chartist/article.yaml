abstract: >
  This research dossier traces a recurring mid-19th-century pattern in Anglo-American
  politics: mass franchise movements that framed themselves as constitutional and moral
  reform were repeatedly portrayed as the thin edge of a socialist wedge. Focusing on
  British Chartism and allied Radical Liberal reform currents alongside U.S. Radical
  Republicans, it follows how opponents and popular media used pejoratives like "Red
  Republicanism" to link demands for political democracy (expanded suffrage, broader
  participation, equal civil status) to the specter of social revolution, atheism, or
  confiscatory "agrarian" redistribution.
  The report tracks key episodes from the 1840s through the Civil War era, with special
  attention to the 1848 European revolutions as an accelerant for panic narratives, and
  compares the strategic constraints these narratives imposed: coalition fragility,
  reputational policing, and repeated pressure on reformers to disavow "socialism" to
  retain legitimacy. The result is a comparative map of how enfranchisement politics
  interacted with early socialist language, and why alliances between political democrats
  and socialist currents often reached hard limits under conditions of press hostility,
  elite suspicion, and fears of disorder.

