title: Chartists & Radical Republicans, 1840-1865
subtitle: Franchise, Socialism, and the Limits of Alliance
linkTitle: ''
description: 'Chartism and Radical Republicanism compared: franchise politics, land reform, religion,
  and the contested boundary between democratic reform and “socialism” in the mid-19th-century Atlantic
  world.'
summary: ''
abstract: A comparative study of British Chartism (1838–1850s) and Radical Republicanism in Britain and
  the United States (1840s–1860s), focusing on how demands for expanded franchise intersected (and often
  failed to align) with “socialist” economic aims. It argues that Chartism’s working-class base and partial
  turn toward cooperative and redistributive proposals created an ambiguous relationship to socialism,
  while parliamentary radicals and U.S. Radical Republicans pursued political and civic equality largely
  within liberal property frameworks. The essay highlights the “limits of alliance” produced by class
  composition, religious culture, and propaganda fears of “Red Republicanism.”
