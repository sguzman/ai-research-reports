summary: ''
abstract: A source-driven overview of how “socialism” and “socialist” entered English and French usage
  (1820-1840), tracing early Owenite, Saint-Simonian, Fourierist, and Icarian meanings and the competing
  doctrinal emphases that shaped the term’s first public life.
