title: Inventing Socialism
subtitle: How a Name Emerged in Britain and France (1820-1840)
linkTitle: ''
description: A compact research note on the earliest documented uses of “socialism/socialist” in Britain
  and France (1820-1840), with mini-profiles and comparative analysis of Owenites, Saint-Simonians, Fourierists,
