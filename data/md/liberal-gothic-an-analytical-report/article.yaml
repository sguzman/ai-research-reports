abstract: '**Executive Summary.** *“Liberal gothic”* is a proposed narrative mode marked by **educated,
  often progressive protagonists** who foreground personal trauma and existential malaise in hushed, introspective
  settings. Unlike classical Gothic (emphasis on supernatural terror and architecture[\[1\]](https://en.wikipedia.org/wiki/Gothic_fiction#:~:text=Gothic%20fiction%2C%20often%20referred%20to,1))
  or Southern Gothic (Mid-20th-century U.S. tales of decay and racial legacy[\[2\]](https://oaktrust.library.tamu.edu/server/api/core/bitstreams/3226b1e0-550f-4bb3-816f-0aec51a3addb/content#:~:text=When%20author%20Ellen%20Glasgow%20coined,from%20the%20South%E2%80%99s%20dark%20past)),
