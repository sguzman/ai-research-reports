abstract: '**Executive Summary:** This report reviews the principles and practical steps for designing,
  building, and operating a small (1–10 kW) Darrieus vertical-axis wind turbine (VAWT). We cover aerodynamic
  theory (lift vs. drag, tip-speed ratio, power coefficient, dynamic stall, cyclic loads), common rotor
  geometries (curved “egg-beater,” straight H-/Giromill, helical), airfoil choices and blade sizing, structural
  design (materials, fatigue, struts, bearings, tower), starting methods (Savonius hybrid, motor assist,
  passive twist), drivetrain and generators (direct-drive PM vs. geared induction, power electronics),
