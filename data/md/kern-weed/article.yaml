---
abstract: >-
  A practical legal and compliance overview of cannabis cultivation as it relates to (1) continuing federal
  prohibition under the Controlled Substances Act, (2) California’s statewide licensing regime administered by
  the Department of Cannabis Control (DCC), and (3) local control in Kern County and its cities. The article
  summarizes key constraints that shape feasibility - including Schedule I status, 280E tax treatment, banking
  friction, licensing categories, local authorization prerequisites, track-and-trace (METRC) obligations,
  security and recordkeeping rules, CEQA and environmental compliance, and enforcement exposure - with special
  emphasis on Kern County’s local prohibition of commercial activity and the limited, city-specific exceptions
  elsewhere in the county.
