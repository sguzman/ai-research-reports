abstract: '**Executive Summary** In the mid-19th century, Karl Marx and Friedrich Engels redefined the
  relationship between “socialism” and “communism,” positioning their own doctrine as *scientific socialism*.
  Prior to 1848, “socialism” was often associated with utopian or middle-class reformers, whereas “communism”
  signified the radical, working-class movement[\[1\]](https://www.marxists.org/archive/marx/works/1848/communist-manifesto/preface.htm#:~:text=Germany,act%20of%20the%20working%20class).
  In the **Communist Manifesto** (Feb 1848), Marx and Engels deliberately chose the term “Communist” to
