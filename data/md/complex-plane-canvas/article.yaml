# article.yaml (metadata override for Pandoc -> EPUB)
title: "Complex Analysis as a Universal Canvas (Euler to Today): A Research Report"
author:
  - "Salvador Guzman"
lang: "en-US"
date: "2026-01-31"

# EPUB package metadata
description: >
  A research report arguing that complex analysis acts as a universal problem-solving
  canvas: by reformulating problems as analytic functions on canonical domains, one
  can leverage holomorphic rigidity, integral formulas, and conformal geometry to
  extract global structure from sparse information. Includes historical development
  (Euler, Cauchy, Riemann, Weierstrass to modern advances) and case-study victories
  spanning number theory, PDEs, geometry, and probability.

keywords:
