  - Riemann surfaces
  - uniformization
  - analytic number theory
  - Riemann zeta function
  - prime number theorem
  - Hardy spaces
  - Nevanlinna theory
  - operator theory
  - Bieberbach conjecture
  - corona problem
  - Schramm-Loewner evolution

subjects:
