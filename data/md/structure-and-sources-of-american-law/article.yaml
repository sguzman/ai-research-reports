abstract: A systematic overview of the structure and sources of American law. The report explains how
  authority is divided between federal and state sovereigns, how constitutions, statutes, treaties, regulations,
  common law, and private legal instruments relate to one another, and how doctrines such as preemption,
  federalism, stare decisis, Erie, and post-Chevron administrative law shape conflict resolution in practice.
