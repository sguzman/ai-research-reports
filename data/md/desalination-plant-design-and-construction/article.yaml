abstract: '**Executive Summary:** Desalination is rapidly growing to meet freshwater shortages, especially
  in arid regions. Modern desalination is dominated by membrane processes (chiefly reverse osmosis, RO)
  which now account for \>80% of global capacity[\[1\]](https://www.iea.org/commentaries/wired-for-water-how-electrification-is-transforming-desalination#:~:text=The%20last%20major%20new%20thermal,consumption%20for%20desalination%20since%202010),
  though thermal methods (MSF/MED) remain important in integrated power–water plants. This report presents
  a comprehensive guide for a desalination plant builder, covering historical development, physical principles,
  technologies, design components, example calculations, environmental and regulatory considerations,
  procurement and costing, operations, and…'
