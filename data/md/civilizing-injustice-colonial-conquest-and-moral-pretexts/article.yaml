abstract: '**Executive Summary:** This report critically examines the claim that foreign powers may legitimately
  conquer or annex a society because it tolerates grave injustices. In three historical case studies (British
  India’s abolition of *sati*, French Algeria’s “civilizing mission,” and U.S. rule in the Philippines
  via “benevolent assimilation”), we compare the stated moral pretexts to the actual motives, processes,
  and outcomes of conquest. We show that colonial powers often used humanitarian rhetoric as a pretext
  for expansion, not as an honest driver of policy. These examples, together with the international legal
  framework (UN Charter, self-determination, customary international law) and modern norms (humanitarian
  intervention, Responsibility to Protect), demonstrate that conquest under the…'
