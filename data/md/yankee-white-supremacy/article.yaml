abstract: 'We define **Managerial Yankee White Supremacy** as a paternalistic ideology in which (Northern)
  white elites disclaim overt racism but claim a unique moral and administrative role in “uplifting” other
  races. In practice they frame racial hierarchy as benevolent stewardship: using humanitarian rhetoric
  to justify control, denying agency to subordinated groups, and exempting themselves from critiques of
  racism. We test four hypotheses: (H1) use of altruistic rhetoric over racial language, (H2) condemnation
  of *others’* racism while self-exempt, (H3) portrayal of nonwhites as incapable without guidance, and
  (H4) centering the white actor’s virtue. Historical evidence from Reconstruction through the 21st century
  supports many elements of this pattern. For example, Reconstruction-era bureaucra…'
