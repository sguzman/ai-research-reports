---
abstract: 'The user’s criticisms of Deleuze center on what they see as the emptiness of his anti-system
  rhetoric: merely “decomposing” social reality (into multiplicities or constructions) does not mean those
  systems are unimportant or dispensable; calling something a “social construction” is not inherently
  a refutation of its reality or power; and theorists who denounce order often rely on its benefits (e.g.
  to write books) while proposing no tangible alternatives. We examine each critique by first outlining
  Deleuzian concepts (difference/repetition, multiplicity, rhizome, assemblage, deterritorialization/ret,
  Body without Organs, desiring-machines) with primary-source citations. We then map the user’s criticisms
  onto Deleuze’s texts and interpretations, contrasting them with sympathetic readings.…'
