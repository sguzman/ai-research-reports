abstract: 'Neil Young’s career has long been framed around a “common man” authenticity – as a solitary
  troubadour recording rough-and-ready folk-rock while championing farmers, the working poor and environmental
  causes. Yet this cultivated persona coexists with deep ties to mainstream institutions: multiple Rock
  & Roll Hall of Fame inductions (solo in 1995 and with Buffalo Springfield in 1997[\[1\]](https://rockhall.com/inductees/neil-young/#:~:text=Through%20every%20shunt%2C%20turn%2C%20sidetrack%2C,%E2%80%93%20and%20us%20with%20him)),
  numerous awards (including a MusiCares “Person of the Year” honor and multiple Grammys[\[2\]](https://www.grammy.com/artists/neil-young/8101#:~:text=,Angry%20World)),
  and leadership roles in charity concerts (co‑founding Farm Aid). Our analysis shows that Young’s pub…'
