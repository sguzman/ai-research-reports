abstract: 1. **Executive Summary** Hasan “HasanAbi” Piker has emerged as one of the most prominent political
  commentators in the livestreaming era, leveraging Twitch’s interactive platform to cultivate a massive
  following and influence online political discourse. This report examines the origins of Piker’s popularity,
  the mechanics sustaining his community engagement, and the challenges and ethical questions surrounding
  his content from 2015 to the present. Piker’s career trajectory illustrates a savvy blend of traditional
  political commentary and new-media tactics. After early years producing left-leaning news content for
  *The Young Turks* (TYT) on Facebook and YouTube, Piker transitioned to Twitch in 2018 to reach younger
  audiences[\[1\]](https://en.wikipedia.org/wiki/Hasan_Piker#:~:text=Twitch).…
