---
title: Gender and GAHT
subtitle: Physiological Effects, Risks, and Timing
linkTitle: ''
description: 'An evidence-oriented, non-prescriptive report on GAHT in AMAB feminizing care: expected
  physiologic changes, risks and benefits, timing (early vs late initiation), monitoring themes, and key
  knowledge gaps.'
summary: ''
abstract: A structured overview of gender-affirming hormone therapy (GAHT) for people assigned male at
  birth (AMAB), focusing on physiologic effects, risk tradeoffs, and how outcomes differ by age of initiation
  (including puberty suppression with GnRHa). Summarizes expected changes in body composition, breast
  development, skin/hair, fertility and sexual function, bone density considerations, cardiovascular and
  thromboembolic risks by estrogen route, and psychosocial outcomes, while emphasizing evidence limitations
  and open research gaps.
