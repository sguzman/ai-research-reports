# Fully-populated metadata for: Mutualism (Inventing Socialism, Report 003)

abstract: >-
  This report reconstructs Pierre-Joseph Proudhon’s mutualism as a distinctive
  strand of nineteenth-century socialism: anti-state, market-affirming, and
  explicitly opposed to capitalist privilege. It focuses on Proudhon’s core
  distinction between “property” (absentee, exploitative ownership backed by
  legal privilege) and “possession” (use-rights grounded in occupancy and labor),
  and on his attempt to preserve exchange while eliminating profit, rent, and
  usury through institutional redesign rather than state seizure. The centerpiece
  is Proudhon’s mutual-credit program, especially the Banque du Peuple (People’s
  Bank) experiment of 1849, which aimed to universalize access to credit at
  administrative cost, thereby “socializing” the effects of capital without
  nationalization. The report situates mutualism in its historical setting
  (1840-1870), tracks key texts and events, clarifies the internal logic of the
  mutual-credit blueprint, and notes later influence on libertarian socialism
  and anarchist traditions alongside contemporaneous critiques.

