---
abstract: A historical and conceptual survey of what mathematicians have meant by "analysis" from the
  Newton–Leibniz era to the present. The essay traces how analysis shifted from a general method of discovery
  contrasted with synthesis into a distinct discipline centered on limits, continuity, infinite processes,
  and the continuum. It follows key semantic pivots driven by calculus, the rise of the function concept,
  the 19th-century program of rigor (Cauchy, Weierstrass), and later expansions into complex, Fourier,
  functional, and modern applied/abstract analysis, highlighting how boundaries with algebra, geometry,
  topology, probability, and computation repeatedly blurred and re-formed.
