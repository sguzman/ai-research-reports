description: >
  A historical-conceptual report tracing how “analysis” evolved from a general problem-solving method
  (analysis vs synthesis) into a modern mathematical discipline centered on limits, continuity, infinite
  processes, and the continuum. Covers key turning points from Newton and Leibniz through Euler,
  Cauchy, Weierstrass, Riemann, Lebesgue, Banach, and 20th-century functional, harmonic, and PDE
  analysis, with attention to institutions, education, and rhetoric in Europe and the United States.

