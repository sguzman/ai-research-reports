abstract: '**Executive Summary:** Internet meme culture is characterized by irreverence, mockery, and
  transgressive humor – traits that closely align with what we define as a “borderer-right” style (anti‐elite,
  honor/taunt culture, low deference, performative aggression, status inversion). This report reviews
  academic and journalistic research on political memes, analyzes meme features across platforms, and
  maps them to borderer-right traits. We find that memes often employ: concise, shocking humor; ridicule
  of elites and “establishment”; in-group bonding through shared symbols; and “digital carnivalesque”
  (festive mockery of the serious)[\[1\]](https://www.uoc.edu/en/news/2024/memes-affect-political-ideas#:~:text=are%20generally%20photomontages%20with%20limited,of%20irony%20to%20online%20interactio…'
