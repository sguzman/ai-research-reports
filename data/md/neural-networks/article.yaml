abstract: An annotated history of artificial neural networks in computing from the 1940s through 2026.
  It traces the ideas that shaped the field - neurons as logical units, perceptrons, gradient-based learning,
  convolution, recurrent models, and attention - and shows how they cycled in and out of favor as compute,
  data, and evaluation practices changed. Along the way it highlights the social and institutional context
  (cybernetics, connectionism, the AI winters, and the deep-learning boom), and explains why certain results
  became decisive turning points. The goal is to give a coherent timeline plus enough mathematical and
  engineering intuition to understand what each wave added, what it failed to solve, and how later work
  reframed earlier limitations.
