description: |
  A research report that formalizes and tests a hypothesis about post-1945 US political dynamics: liberal-capitalist institutions
  can absorb and professionalize many forms of left dissent by translating them into administrable, “legible” forms, without
  eliminating underlying drivers. The report argues that dissentary energy can be rerouted rather than destroyed (“conservation
  of radicalism”), and explores why right dissidence may be less susceptible to the same absorption pipeline (“asymmetric
  co-optability”). A two-axis “complex-plane” analogy is used to model how conflict shifts across institutional and anti-institutional
  dimensions.

