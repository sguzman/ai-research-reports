abstract: >-
  This essay proposes a compact, falsifiable model of modern radical politics using a
  “complex-plane” style picture: one axis captures institutional co-optation
  (absorption/neutralization of insurgent movements through parties, NGOs, academia,
  philanthropy, and policy incorporation), while another captures ideological
  substitution (the partial replacement of class-centered conflict by culture/status
  conflict). The core claim is a “conservation of radical energy”: as left
  revolutionary capacity is professionalized, fragmented, or domesticated inside
  liberal-democratic systems, radical grievance is not eliminated but rerouted,
  increasingly expressing itself through right-populist and right-radical channels.
  A second claim is asymmetry: right movements are less co-optable by the same
  institutional pipelines because their identity is often defined against elite
  institutions and liberal norms. The report synthesizes mechanisms of co-optation,
  proposes observable signatures, surveys illustrative cases, and ends with explicit
  counterevidence tests that could refine or falsify the model.
