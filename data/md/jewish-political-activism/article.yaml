abstract: >-
  A long-run survey of Jewish political activism in the United States from 1880 to 2025,
  tracking shifts from immigrant labor organizing to civil-rights coalition politics,
  pro- and anti-communist foreign-policy networks, and contemporary campus/digital-era
  polarization. Emphasizes mechanisms of influence (votes, unions, litigation, philanthropy,
  lobbying, media) while separating documented influence from conspiratorial tropes.

