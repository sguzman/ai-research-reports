abstract: >
  A historical and conceptual survey of category theory from its precursors in 1930s structural mathematics
  to its invention in the 1940s by Eilenberg and Mac Lane, and its consolidation through the mid-1960s.
  The report explains why “naturality” and functorial thinking mattered in algebraic topology, how categories,
  functors, and natural transformations reframed structure, and how later figures (notably Grothendieck and
  Lawvere) helped establish categorical methods as a central language in modern mathematics.

