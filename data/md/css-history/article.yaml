abstract: >
  CSS (Cascading Style Sheets) grew from a mid-1990s attempt to separate content
  from presentation into a mature, modular platform for layout, typography,
  interaction, and responsive design. This essay traces CSS along two coupled
  histories: the formal arc of standards (W3C Recommendations, snapshots, and
  module levels) and the informal arc of real-world practice (browser wars,
  interoperability pain, community patterns like OOCSS/BEM/SMACSS, and major
  demonstrations such as CSS Zen Garden and responsive design). It emphasizes
  how implementation constraints shaped the spec process (notably the long
  CSS2.1 stabilization) and how developer needs pushed new capabilities (Flexbox,
  Grid, media queries, tooling, and design systems). The result is a coherent
  timeline of institutions, specs, and practice that explains not only what
  modern CSS can do, but why the ecosystem evolved the way it did.

