abstract: A growing body of evidence suggests that judicial outcomes often favor entrenched or elite interests
  (the “establishment” or “pro-yankee” side) over underdog challengers. Landmark U.S. Supreme Court cases
  across history routinely vindicate business, property, and government powers at the expense of labor,
  individuals, or progressive aims. For example, early cases like *Dartmouth College v. Woodward* (1819)
  and *Lochner v. New York* (1905) protected corporate charters and struck down labor regulations[\[1\]](https://supreme.justia.com/cases/federal/us/17/518/#:~:text=The%20charter%20granted%20by%20the,not%20dissolved%20by%20the%20Revolution)[\[2\]](https://constitutioncenter.org/the-constitution/supreme-court-case-library/lochner-v-new-york#:~:text=vis,legitimate%20health%20or%20safety%20o…
