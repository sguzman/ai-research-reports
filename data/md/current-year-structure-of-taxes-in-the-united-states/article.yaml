---
abstract: >-
  A current-structure survey of taxation in the United States using the latest
  official data cited in the report as of April 27, 2026. It covers the federal
  tax mix, 2026 rate parameters, recent legislative changes, tax expenditures,
  distributional incidence, compliance and the tax gap, and the contrasting
  structure of state and local taxation, including revenue concentration and
  volatility in California.
